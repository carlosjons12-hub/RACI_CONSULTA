<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta tu RACI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --raci-a: #10b981; --raci-b: #8b5cf6; --raci-c: #f59e0b; --dark-bg: #0f172a; --accent: #3b82f6; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; margin: 0; padding: 0; }
        
        /* DISEÑO VISTA USUARIO */
        .main-card { display: none; border-radius: 30px; background: #fff; margin-top: 30px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.05); }
        .header-raci { padding: 50px 20px; text-align: center; color: white; transition: 0.5s; }
        .nivel-A .header-raci { background: linear-gradient(135deg, #065f46, var(--raci-a)); }
        .nivel-B .header-raci { background: linear-gradient(135deg, #5b21b6, var(--raci-b)); }
        .nivel-C .header-raci { background: linear-gradient(135deg, #92400e, var(--raci-c)); }
        
        .stat-row { padding: 18px; border-radius: 18px; margin-bottom: 12px; background: #f8fafc; border: 1px solid #edf2f7; cursor: pointer; transition: 0.3s; }
        .detail-box { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; background: #1e293b !important; border-radius: 15px; }
        .stat-row:hover .detail-box { max-height: 500px; opacity: 1; margin-top: 15px; padding: 18px; }
        
        .item-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); color: #fff !important; font-size: 0.85rem; }
        .txt-tengo { color: #60a5fa !important; font-weight: 700; }
        .txt-meta { color: #94a3b8 !important; font-size: 0.7rem; }
        
        .roadmap-list { list-style: none; padding: 0; }
        .roadmap-list li { margin-bottom: 10px; padding: 12px 12px 12px 40px; background: #fff; border-radius: 12px; position: relative; font-size: 0.85rem; border: 1px solid #eee; border-left: 4px solid #ef4444; }
        .roadmap-list li::before { content: "\F282"; font-family: bootstrap-icons; position: absolute; left: 12px; color: #ef4444; font-weight: bold; }

        /* DISEÑO PANEL ADMIN */
        #adminView { display: none; background: #0f172a; min-height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 2000; color: white; }
        .admin-card { background: #1e293b; border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .donut { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; position: relative; }
        .donut-inner { width: 70px; height: 70px; background: #1e293b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }
        .btn-admin-float { 
    position: fixed; 
    bottom: 15px; /* Un poco más cerca del borde */
    right: 15px; 
    width: 35px;  /* Tamaño reducido */
    height: 35px; /* Tamaño reducido */
    border-radius: 8px; /* Bordes menos redondeados para que parezca un detalle del marco */
    background: #1e293b; 
    color: white; 
    border: none; 
    z-index: 3000; 
    
    /* ESTADO INICIAL: OCULTO */
    opacity: 0; 
    cursor: default;
    transition: all 0.4s ease;
}

/* APARECE AL PASAR EL MOUSE POR LA ESQUINA */
.btn-admin-float:hover { 
    opacity: 0.8; /* No necesita ser 100% sólido para ser discreto */
    cursor: pointer;
    transform: scale(1.1);
}
        .subio { color: #10b981 !important; font-weight: bold; }
        .bajo { color: #ef4444 !important; font-weight: bold; }

        body {
    /* Mantenemos tu imagen, pero con un filtro más claro */
    background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                url('logo.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
}

/* Tarjetas con efecto de cristal blanco */
.main-card, .admin-card, .report-view {
    background: rgba(255, 255, 255, 0.85) !important; /* Blanco al 85% de opacidad */
    backdrop-filter: blur(12px); /* Desenfoque del fondo */
    -webkit-backdrop-filter: blur(12px); /* Soporte para Safari */
    border: 1px solid rgba(255, 255, 255, 0.3); /* Borde sutil brillante */
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); /* Sombra suave para dar profundidad */
}

/* Ajuste para el Panel de Admin para que no sea tan oscuro */
#adminView {
    background: transparent; /* Permite ver el fondo de la empresa */
}

/* Aseguramos que el texto de las tablas sea negro sólido sobre el fondo claro */
.table-exec td, .table-exec th {
    color: #0f172a !important;
}

.footer-minimal {
    padding: 12px 0; /* Mucho más delgado */
    margin-top: auto; /* Se pega al final */
    background: rgba(255, 255, 255, 0.4); /* Casi transparente */
    backdrop-filter: blur(5px);
    border-top: 1px solid rgba(0, 0, 0, 0.05);
    font-size: 9px; /* Letra bien chica y elegante */
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.copyright {
    opacity: 0.7;
}

.author {
    border-left: 2px solid var(--raci-a); /* Una pequeña línea de color para resaltar */
    padding-left: 10px;
}

/* Ajuste para que el cuerpo de la página no se vea apretado */
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* MODO OSCURO PARA ADMIN */
body.admin-active {
    /* Oscurecemos mucho más el fondo de la empresa para que resalte el panel */
    background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                url('tu-imagen-empresa.jpg') !important;
    background-size: cover;
    background-attachment: fixed;
    color: #f8fafc; /* Texto claro */
}

/* Tarjetas en modo admin */
body.admin-active .admin-card, 
body.admin-active .report-view {
    background: rgba(30, 41, 59, 0.7) !important; /* Azul marino traslúcido */
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white !important;
}

/* Tablas en modo admin */
body.admin-active .table-exec { color: white !important; }
body.admin-active .table-exec th { background: rgba(255,255,255,0.05); color: #94a3b8; border-bottom-color: var(--accent); }
body.admin-active .table-exec td { color: #e2e8f0 !important; border-bottom-color: rgba(255,255,255,0.05); }

/* Títulos en modo admin */
body.admin-active h2, body.admin-active h4 { color: white !important; }
body.admin-active .text-muted { color: #94a3b8 !important; }
    </style>
</head>

<body>
<div id="userView" class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-3 fw-bold">CONSULTA TU <span class="text-primary">RACI</span></h1>
        <div id="statusTag" class="badge bg-white text-muted border py-2 px-3 mt-2 shadow-sm">Conectando...</div>
        <div class="input-group w-50 mx-auto mt-4 bg-white p-2 border rounded-pill shadow-sm">
            <input type="text" id="idSearch" class="form-control border-0 ps-4" placeholder="Ingresa tu ID de colaborador...">
            <button class="btn btn-primary rounded-pill px-4 fw-bold" onclick="buscarID()">BUSCAR</button>
        </div>
    </div>

    <div id="resultadoUser" class="main-card">
        <div id="themeContainer">
            <div class="header-raci">
                <h1 id="resNombre" class="display-4 fw-bold mb-0 text-white">---</h1>
                <p id="resID" class="fs-4 opacity-75 text-white">---</p>
            </div>
            <div class="p-4 p-md-5">
                <div class="row g-5">
                    <div class="col-lg-7">
                        <h5 class="fw-bold mb-4 text-muted"><i class="bi bi-bar-chart-fill me-2"></i>INDICADORES</h5>
                        <div id="graficasUser"></div>
                    </div>
                    <div class="col-lg-5">
                        <div class="p-4 bg-light rounded-4 border h-100 shadow-sm">
                            <div class="text-center mb-4">
                                <h6 class="text-uppercase text-muted small fw-bold">Puntaje Total Actual</h6>
                                <h1 class="display-1 fw-bold my-1 text-dark" id="resTotal">0.000</h1>
                                <div id="resBadge" class="badge rounded-pill px-4 py-2 fs-5">---</div>
                            </div>
                            <hr>
                            <h6 id="roadmapTitle" class="fw-bold text-dark mb-3 text-uppercase small"></h6>
                            <ul id="resRoadmap" class="roadmap-list"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="adminView">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-shield-lock-fill text-info"></i> RACI PERFORMANCE</h2>
            <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="salirAdmin()">CERRAR PANEL</button>
        </div>

        <div class="row g-4 mb-4" id="statsAdmin"></div>

        <div class="admin-card mb-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="small fw-bold opacity-75 mb-2 text-uppercase">Búsqueda rápida de un usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-white"><i class="bi bi-search"></i></span>
                        <input type="text" id="busquedaAdmin" class="form-control bg-transparent border-secondary text-white" placeholder="Nombre o ID..." onkeyup="adminSearch()">
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="small fw-bold opacity-75 mb-2 text-uppercase">Filtros por Nivel</label>
                    <div class="d-flex gap-2">
                        <button class="btn btn-light btn-sm flex-fill fw-bold" onclick="generarReporteAdmin('ALL')">TODOS</button>
                        <button class="btn btn-success btn-sm flex-fill fw-bold" onclick="generarReporteAdmin('A')">RACI A</button>
                        <button class="btn btn-primary btn-sm flex-fill fw-bold" onclick="generarReporteAdmin('B')">RACI B</button>
                        <button class="btn btn-warning btn-sm flex-fill fw-bold" onclick="generarReporteAdmin('C')">RACI C</button>
                    </div>
                </div>
            </div>
            <hr class="my-4 opacity-25">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h6 class="fw-bold mb-3"><i class="bi bi-files me-2"></i>Comparar</h6>
                    <div class="row g-2">
                        <div class="col-6"><input type="file" id="f1" class="form-control form-control-sm bg-dark text-white border-secondary" accept=".csv"></div>
                        <div class="col-6"><input type="file" id="f2" class="form-control form-control-sm bg-dark text-white border-secondary" accept=".csv"></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-info w-100 fw-bold mt-4" onclick="procesarComparativaAdmin()">COMPARAR</button>
                </div>
            </div>
        </div>

        <div id="seccionTablaAdmin" style="display:none;" class="admin-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 id="tituloAdmin" class="fw-bold mb-0"></h4>
                <div class="d-flex gap-2">
                    <span id="cuentaAdmin" class="badge bg-secondary py-2 px-3"></span>
                    <button class="btn btn-outline-danger btn-sm" onclick="exportarAdminPDF()">PDF</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0">
                    <thead id="headAdmin"></thead>
                    <tbody id="bodyAdmin"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<button class="btn-admin-float" onclick="intentarAdmin()"><i class="bi bi-gear-fill"></i></button>

<script>
    const URL_PUB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwbtqw-G0-PT42vuJJ9Ctwy3BIVFklNex509-zLjwPWyniibagmqcyi71aqPxL7mDgH3kXg5OFIvJT/pub?output=csv";
    let db = [];

    function fixEncoding(text) {
        try { return decodeURIComponent(escape(text)); } catch(e) { return text; }
    }

    function superParse(val, isTotal = false) {
        if (!val) return 0;
        let s = val.toString().trim().replace(',', '.');
        let n = parseFloat(s.replace(/[^0-9.-]/g, ''));
        if (isTotal) return (n > 1.5) ? n / 1000 : n;
        return (n > 1) ? n / 100 : n;
    }

    window.onload = async () => {
        try {
            const r = await fetch(URL_PUB);
            const t = await r.text();
            const res = Papa.parse(t, { skipEmptyLines: true }).data;
            const h = res.findIndex(row => row.some(c => c.toString().toUpperCase() === "ID"));
            db = res.slice(h + 1).filter(row => row[1]);
            document.getElementById('statusTag').innerText = `✅ Sincronizado: ${db.length} registros`;
        } catch (e) { document.getElementById('statusTag').innerText = "❌ Error de conexión"; }
    };

    function buscarID() {
        const id = document.getElementById('idSearch').value.trim().toUpperCase();
        const r = db.find(row => row[1] && row[1].toUpperCase() === id);
        if(!r) return alert("ID no encontrado.");
        
        document.getElementById('resultadoUser').style.display = 'block';
        document.getElementById('themeContainer').className = "nivel-" + r[33];
        document.getElementById('resNombre').innerText = r[2];
        document.getElementById('resID').innerText = "ID: " + r[1];
        document.getElementById('resTotal').innerText = superParse(r[32], true).toFixed(3);
        
        const b = document.getElementById('resBadge');
        b.innerText = "Nivel Actual: " + r[33];
        b.style.background = r[33] === 'A' ? '#10b981' : (r[33] === 'B' ? '#8b5cf6' : '#f59e0b');

        const road = document.getElementById('resRoadmap'); road.innerHTML = "";
        document.getElementById('roadmapTitle').innerText = r[33] === 'A' ? "Estatus: Nivel Máximo" : "Guía para subir de nivel:";
        
        const cats = [
            { l: "Desempeño Técnico", v: superParse(r[9]), m: 0.15, items: [{n:"Retro",v:r[3],g:"Sobresaliente"},{n:"Pares",v:r[5],g:"SI"},{n:"Shadowing",v:r[7],g:"SI"}] },
            { l: "Desempeño Académico", v: superParse(r[16]), m: 0.10, items: [{n:"Título",v:r[10],g:"SI"},{n:"Certif.",v:r[12],g:"5+"}, {n:"Inglés",v:r[14],g:"Avanzado"}] },
            { l: "Antigüedad", v: superParse(r[19]), m: 0.10, items: [{n:"Antiguedad",v:r[17],g:"5 Años+"}] },
            { l: "Conocimiento", v: superParse(r[24]), m: 0.25, items: [{n:"Especialidad",v:r[20],g:"4+"},{n:"Assessment",v:r[22],g:"Alto"}] },
            { l: "Actitud", v: superParse(r[29]), m: 0.25, items: [{n:"Equipo",v:r[25],g:"Siempre"},{n:"Tareas",v:r[27],g:"Alta"}] },
            { l: "Rentabilidad", v: superParse(r[31]), m: 0.15, items: [{n:"Rentabilidad",v:r[30],g:"11%+"}] }
        ];

        if (r[33] === 'A') {
            road.innerHTML = "<li style='border-left-color:#10b981'><b>¡Felicidades!</b> Mantén tus indicadores.</li>";
        } else {
            cats.forEach(c => {
                c.items.forEach(i => {
                    let vU = (i.v || "").toString().toUpperCase();
                    let mU = (i.g || "").toString().toUpperCase();
                    if (vU !== mU && vU !== "SI" && vU !== "SIEMPRE" && vU !== "SOBRESALIENTE") {
                        road.innerHTML += `<li><b>${i.n}:</b> Tienes <i>"${i.v || '0'}"</i>. Meta: <b>"${i.g}"</b>.</li>`;
                    }
                });
            });
        }

        document.getElementById('graficasUser').innerHTML = cats.map(c => {
            let det = '';
            c.items.forEach(i => det += `<div class="item-row"><span>${i.n}</span><div><span class="txt-tengo">${i.v || '0'}</span><span class="txt-meta"> / ${i.g}</span></div></div>`);
            const pct = Math.min((c.v / c.m) * 100, 100);
            return `<div class="stat-row">
                <div class="d-flex justify-content-between fw-bold mb-1"><span>${c.l}</span><span>${(c.v*100).toFixed(1)}% / ${(c.m*100)}%</span></div>
                <div class="progress" style="height:12px; border-radius:10px;"><div class="progress-bar" style="width:${pct}%"></div></div>
                <div class="detail-box"><p class="small fw-bold mb-2 text-info">AUDITORÍA</p>${det}</div>
            </div>`;
        }).join('');
    }

    function intentarAdmin() {
    if(prompt("Password:") === "Praxis.2026#") {
        document.getElementById('userView').style.display = 'none';
        document.getElementById('adminView').style.display = 'block';
        
        // ACTIVAR MODO OSCURO
        document.body.classList.add('admin-active');
        
        renderStatsAdmin(); 
    }
}

function salirAdmin() {
    document.getElementById('adminView').style.display = 'none';
    document.getElementById('userView').style.display = 'block';
    
    // DESACTIVAR MODO OSCURO (Vuelve al modo empresa claro)
    document.body.classList.remove('admin-active');
}

    function renderStatsAdmin() {
        const c = { A:0, B:0, C:0, T:db.length };
        db.forEach(r => { if(c[r[33]] !== undefined) c[r[33]]++; });
        const conf = [{l:'TOTAL',v:c.T,k:'var(--accent)'},{l:'RACI A',v:c.A,k:'var(--raci-a)'},{l:'RACI B',v:c.B,k:'var(--raci-b)'},{l:'RACI C',v:c.C,k:'var(--raci-c)'}];
        document.getElementById('statsAdmin').innerHTML = conf.map(x => `
            <div class="col-md-3 col-6 text-center">
                <div class="donut mb-2" style="background:conic-gradient(${x.k} ${(x.v/c.T*100)}%, #334155 0)"><div class="donut-inner">${x.v}</div></div>
                <small class="fw-bold opacity-75">${x.l}</small>
            </div>`).join('');
    }

    function adminSearch() {
        const q = document.getElementById('busquedaAdmin').value.toUpperCase();
        const res = db.filter(r => r[1].includes(q) || r[2].toUpperCase().includes(q));
        pintarTablaAdmin(res, "Búsqueda: " + q);
    }

    function generarReporteAdmin(f) {
        const res = f === 'ALL' ? db : db.filter(r => r[33] === f);
        pintarTablaAdmin(res, f === 'ALL' ? "Consolidado General" : "Nivel " + f);
    }

    function pintarTablaAdmin(data, tit) {
        document.getElementById('seccionTablaAdmin').style.display = 'block';
        document.getElementById('tituloAdmin').innerText = tit;
        document.getElementById('cuentaAdmin').innerText = `Total: ${data.length} colaboradores encontrados.`;
        document.getElementById('headAdmin').innerHTML = `<tr><th>#</th><th>Nombre</th><th>ID</th><th>Nivel</th><th>Puntaje</th></tr>`;
        document.getElementById('bodyAdmin').innerHTML = data.map((r, i) => `
            <tr><td>${i+1}</td><td><b>${fixEncoding(r[2])}</b></td><td>${r[1]}</td><td><span class="badge" style="background:${r[33]=='A'?'#10b981':r[33]=='B'?'#8b5cf6':'#f59e0b'}">${r[33]}</span></td><td class="fw-bold">${superParse(r[32],true).toFixed(3)}</td></tr>
        `).join('');
    }

    async function procesarComparativaAdmin() {
        const file1 = document.getElementById('f1').files[0];
        const file2 = document.getElementById('f2').files[0];
        if(!file1 || !file2) return alert("Selecciona ambos archivos");

        const read = (f) => new Promise(res => Papa.parse(f, { 
            encoding: "ISO-8859-1", 
            complete: d => res(d.data) 
        }));
        
        const d1 = await read(file1); 
        const d2 = await read(file2);
        const resultados = [];
        
        d2.filter(n => n[1] && n[1] !== 'ID').forEach(nuevo => {
            const viejo = d1.find(v => v[1] === nuevo[1]);
            if(viejo) {
                const p1 = superParse(viejo[32], true);
                const p2 = superParse(nuevo[32], true);
                const diff = (p2 - p1).toFixed(3);
                let badge = nuevo[33];
                if(viejo[33] !== nuevo[33]) badge = `<span class="badge bg-info text-dark">${viejo[33]} ➔ ${nuevo[33]}</span>`;
                resultados.push({ id: nuevo[1], nom: nuevo[2], p1: p1.toFixed(3), p2: p2.toFixed(3), d: diff, b: badge });
            }
        });

        document.getElementById('seccionTablaAdmin').style.display = 'block';
        document.getElementById('tituloAdmin').innerText = "Comparativa Mensual Local";
        document.getElementById('headAdmin').innerHTML = `<tr><th>#</th><th>Nombre</th><th>ID</th><th>Ant.</th><th>Act.</th><th>Dif.</th><th>Nivel</th></tr>`;
        document.getElementById('bodyAdmin').innerHTML = resultados.map((r, i) => `
            <tr><td>${i+1}</td><td><b>${fixEncoding(r.nom)}</b></td><td>${r.id}</td><td>${r.p1}</td><td>${r.p2}</td>
            <td class="${r.d > 0 ? 'subio' : (r.d < 0 ? 'bajo' : '')}">${r.d > 0 ? '↑':'↓'} ${Math.abs(r.d)}</td><td>${r.b}</td></tr>
        `).join('');
    }

    function exportarAdminPDF() {
    const titulo = document.getElementById('tituloAdmin').innerText;
    const filas = document.querySelectorAll('#bodyAdmin tr');
    const encabezados = document.querySelectorAll('#headAdmin th');
    const esComparativa = titulo.includes("Comparativa");
    const coloresNivel = { 'A': '#10b981', 'B': '#8b5cf6', 'C': '#f59e0b' };

    let htmlParaPDF = `
    <div style="font-family: Arial, sans-serif; background-color: white; padding: 0; color: black; min-height: 100%;">
        
        <div style="background-color: #1e293b; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; color: white;">
            <div>
                <h1 style="margin: 0; font-size: 16pt;">${titulo.toUpperCase()}</h1>
                <p style="margin: 2px 0 0 0; font-size: 8pt; color: #3b82f6; font-weight: bold;">PRAXIS PERFORMANCE • REPORTE DE SISTEMA</p>
            </div>
            <div style="text-align: right;">
                <p style="margin: 0; font-size: 10pt; font-weight: bold;">${new Date().toLocaleDateString()}</p>
                <p style="margin: 0; font-size: 8pt; opacity: 0.8;">Registros: ${filas.length}</p>
            </div>
        </div>

        <table style="width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed;">
            <thead>
                <tr style="background-color: #334155;">
                    ${Array.from(encabezados).map(th => `
                        <th style="border: 1px solid #ddd; padding: 6px; color: white; text-align: center; font-size: ${esComparativa ? '7pt' : '8pt'}; text-transform: uppercase;">${th.innerText}</th>
                    `).join('')}
                </tr>
            </thead>
            <tbody>
                ${Array.from(filas).map((tr, index) => {
                    const bgColor = (index % 2 === 0) ? '#ffffff' : '#f8fafc';
                    return `
                    <tr style="background-color: ${bgColor}; page-break-inside: avoid !important;">
                        ${Array.from(tr.cells).map((td, cellIndex) => {
                            let texto = td.innerText.trim();
                            let contenidoHtml = td.innerHTML;
                            let estiloExtra = "color: black;";

                            const nivelDestino = texto.includes('➔') || texto.includes('->') 
                                ? texto.split(/➔|->/).pop().trim() 
                                : texto;
                            
                            if (coloresNivel[nivelDestino]) {
                                const esCambio = texto.length > 1;
                                contenidoHtml = `<div style="background-color: ${coloresNivel[nivelDestino]}; color: white; min-width: ${esCambio ? 'auto' : '22px'}; padding: ${esCambio ? '0 8px' : '0'}; height: 22px; line-height: 22px; text-align: center; border-radius: 4px; font-weight: bold; margin: auto; display: inline-block; font-size: 8pt; white-space: nowrap;">${texto}</div>`;
                            }

                            if (texto.includes('↑')) {
                                estiloExtra = "color: #059669; font-weight: bold;";
                            } else if (texto.includes('↓')) {
                                const valorNum = parseFloat(texto.replace(/[^\d.-]/g, ''));
                                if (valorNum !== 0 && !isNaN(valorNum)) {
                                    estiloExtra = "color: #dc2626; font-weight: bold;";
                                } else {
                                    contenidoHtml = "0.000"; 
                                    estiloExtra = "color: black; font-weight: normal;";
                                }
                            }

                            return `<td style="border: 1px solid #ddd; padding: 5px; font-size: ${esComparativa ? '7pt' : '8pt'}; text-align: center; ${estiloExtra}">${contenidoHtml}</td>`;
                        }).join('')}
                    </tr>`;
                }).join('')}
            </tbody>
        </table>
        
        <div style="height: 60px; width: 100%; background: white; clear: both;"></div>
    </div>`;

    const opt = {
        margin: [10, 5, 15, 5],
        filename: `Reporte_RACI_${new Date().getTime()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 2, 
            useCORS: true, 
            backgroundColor: '#ffffff',
            scrollX: 0,
            scrollY: 0,
            onclone: (clonedDoc) => {
                // Forzamos que el clon tenga altura suficiente para todos los registros
                clonedDoc.body.style.height = 'auto';
            }
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };

    // Usamos el método worker para asegurar que se procese todo antes de guardar
    html2pdf().set(opt).from(htmlParaPDF).toPdf().get('pdf').then(function (pdf) {
        // Esto confirma que el PDF se generó antes de descargarlo
        console.log("PDF Generado con " + filas.length + " registros.");
    }).save();
}
    
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA RACI - CONSULTA 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --raci-a: #10b981; --raci-b: #3b82f6; --raci-c: #f59e0b; }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* ESTILOS DE LOS CUADRITOS (BADGES) */
        .badge-lvl { padding: 6px 12px; border-radius: 8px; color: white; font-weight: 800; font-size: 0.85rem; display: inline-block; }
        .bg-a { background-color: var(--raci-a); }
        .bg-b { background-color: var(--raci-b); }
        .bg-c { background-color: var(--raci-c); }
        
        /* CUADRITO DE CAMBIO (COMPARATIVA) */
        .change-pill { 
            font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; border: 1px solid; 
            margin-left: 10px; display: inline-block;
        }
        .up { background: #dcfce7; color: #166534; border-color: #166534; }
        .down { background: #fee2e2; color: #991b1b; border-color: #991b1b; }

        .card-raci { background: white; border-radius: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.04); overflow: hidden; }
        .header-raci { padding: 40px; text-align: center; color: white; }
        .nivel-A .header-raci { background: linear-gradient(135deg, #059669, var(--raci-a)); }
        .nivel-B .header-raci { background: linear-gradient(135deg, #2563eb, var(--raci-b)); }
        .nivel-C .header-raci { background: linear-gradient(135deg, #d97706, var(--raci-c)); }

        /* PANEL ADMIN OCULTO */
        #adminTools { display: none; margin-top: 30px; animation: fadeIn 0.5s; }
        .btn-admin { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 12px; background: #0f172a; color: white; border: none; opacity: 0.8; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-800 display-5" style="font-weight: 800;">CONSULTA <span class="text-primary">RACI</span></h1>
        <p class="text-muted">Ingresa tu ID para conocer tu nivel y desempeño actual</p>
        
        <div class="input-group w-50 mx-auto shadow-sm rounded-pill overflow-hidden bg-white p-2 border">
            <input type="text" id="idInput" class="form-control border-0 ps-4" placeholder="Ej: ABC12345">
            <button class="btn btn-primary rounded-pill px-4 fw-bold" onclick="consultar()">BUSCAR</button>
        </div>
        <div id="loadStatus" class="small mt-2 text-muted">Cargando base de datos...</div>
    </div>

    <div id="resultado" class="card-raci mb-5" style="display:none;">
        <div id="fichaColor">
            <div class="header-raci">
                <h1 id="rNombre" class="fw-bold mb-0"></h1>
                <p id="rID" class="fs-5 opacity-75 mb-0"></p>
            </div>
            <div class="p-4 row align-items-center">
                <div class="col-md-7 border-end" id="rStats"></div>
                <div class="col-md-5 text-center">
                    <h6 class="text-muted small fw-bold">PUNTAJE TOTAL</h6>
                    <h1 class="display-1 fw-bold mb-0" id="rTotal">0.000</h1>
                    <div id="rBadge" class="mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="adminTools">
        <hr class="my-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0 text-dark"><i class="bi bi-shield-lock-fill"></i> Panel de Control Administrativo</h4>
            <div class="btn-group shadow-sm">
                <button class="btn btn-dark" onclick="verTabla('ALL')">TODOS</button>
                <button class="btn btn-success" onclick="verTabla('A')">A</button>
                <button class="btn btn-primary" onclick="verTabla('B')">B</button>
                <button class="btn btn-warning" onclick="verTabla('C')">C</button>
            </div>
        </div>
        
        <div class="card-raci p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr class="small">
                        <th class="ps-4">#</th><th>CONSULTOR</th><th>ID</th><th class="text-center">NIVEL / CAMBIO</th><th class="text-center">PUNTAJE</th>
                    </tr>
                </thead>
                <tbody id="tablaAdminBody"></tbody>
            </table>
        </div>
    </div>
</div>

<button class="btn-admin shadow" onclick="activarAdmin()"><i class="bi bi-gear-fill"></i></button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
    let actualDB = [];
    let anteriorDB = [];

    window.onload = () => {
        // Jala los archivos de tu GitHub Pages automáticamente
        Promise.all([
            fetchCSV('actual.csv', true),
            fetchCSV('anterior.csv', false)
        ]).then(() => {
            document.getElementById('loadStatus').innerText = "Base de datos lista: " + actualDB.length + " registros.";
        });
    };

    function activarAdmin() {
        if(prompt("Clave de Acceso:") === "Praxis.2026#") {
            document.getElementById('adminTools').style.display = 'block';
            verTabla('ALL');
            window.scrollTo(0, document.body.scrollHeight);
        }
    }

    async function fetchCSV(url, esActual) {
        return new Promise((resolve) => {
            Papa.parse(url, {
                download: true,
                header: false,
                skipEmptyLines: 'greedy', // SOLUCIÓN AL CORTE 194
                encoding: "ISO-8859-1",
                complete: function(results) {
                    const rowStart = results.data.findIndex(r => r.join('').includes("ID"));
                    if(rowStart !== -1) {
                        // Filtramos para que SOLO lea filas con ID y Nombre real
                        const dataLimpia = results.data.slice(rowStart + 1).filter(r => r[1] && r[1].trim().length > 3);
                        const mapped = dataLimpia.map(r => ({
                            id: r[1].trim().toUpperCase(),
                            nom: r[2],
                            n: r[9],
                            t: r[16], ac: r[19], an: r[24], c: r[29], act: r[31], r: r[32],
                            tot: parseFloat(r[33]) || 0
                        }));
                        if(esActual) actualDB = mapped;
                        else anteriorDB = mapped;
                    }
                    resolve();
                }
            });
        });
    }

    function consultar() {
        const id = document.getElementById('idInput').value.trim().toUpperCase();
        const u = actualDB.find(x => x.id === id);
        if(!u) return alert("ID no encontrado en el sistema.");

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('fichaColor').className = 'nivel-' + u.n;
        document.getElementById('rNombre').innerText = u.nom;
        document.getElementById('rID').innerText = "ID: " + u.id;
        document.getElementById('rTotal').innerText = u.tot.toFixed(3);
        document.getElementById('rBadge').innerHTML = `<span class="badge-lvl bg-${u.n.toLowerCase()}">NIVEL ${u.n}</span>`;

        const metrics = [{l:"Técnico",v:u.t},{l:"Académico",v:u.ac},{l:"Antigüedad",v:u.an},{l:"Conocimiento",v:u.c},{l:"Actitud",v:u.act},{l:"Rentabilidad",v:u.r}];
        document.getElementById('rStats').innerHTML = metrics.map(m => `
            <div class="mb-2 small fw-bold d-flex justify-content-between"><span>${m.l}</span><span>${m.v}</span></div>
            <div class="progress mb-3" style="height:6px;"><div class="progress-bar" style="width:${parseFloat(m.v)*100}%"></div></div>
        `).join('');
    }

    function verTabla(filtro) {
        const lista = filtro === 'ALL' ? actualDB : actualDB.filter(x => x.n === filtro);
        const tbody = document.getElementById('tablaAdminBody');
        tbody.innerHTML = "";

        lista.forEach((u, i) => {
            // LÓGICA DE CUADRITOS DE COMPARACIÓN (Solo para el Admin)
            let cambio = "";
            const ant = anteriorDB.find(x => x.id === u.id);
            if(ant && ant.n !== u.n) {
                const subio = u.n < ant.n; // A es mejor que B
                cambio = `<span class="change-pill ${subio?'up':'down'}">${ant.n} <i class="bi bi-arrow-right"></i> ${u.n}</span>`;
            }

            tbody.innerHTML += `
                <tr>
                    <td class="ps-4 text-muted">${i+1}</td>
                    <td><b>${u.nom}</b></td>
                    <td><code>${u.id}</code></td>
                    <td class="text-center">
                        <span class="badge-lvl bg-${u.n.toLowerCase()}">${u.n}</span>
                        ${cambio}
                    </td>
                    <td class="text-center fw-bold">${u.tot.toFixed(3)}</td>
                </tr>`;
        });
    }
</script>
</body>
</html>

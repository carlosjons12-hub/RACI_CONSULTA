/* Botón de Tour Moderno */
.btn-tour-modern {

    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.btn-tour-modern .icon-circle {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.1rem;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
}

.btn-tour-modern span {
    font-weight: 600;
    font-size: 0.9rem;
    color: #1e293b;
}

.btn-tour-modern:hover {
    transform: translateY(-2px);
    background: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Efecto de pulso para llamar la atención del usuario */
.btn-tour-modern .icon-circle::after {
    content: '';
    position: absolute;
    width: 32px;
    height: 32px;
    background: rgba(59, 130, 246, 0.4);
    border-radius: 50%;
    z-index: -1;

}

@keyframes pulse-tour {

<script>

//"https://docs.google.com/spreadsheets/d/e/2PACX-1vQwbtqw-G0-PT42vuJJ9Ctwy3BIVFklNex509-zLjwPWyniibagmqcyi71aqPxL7mDgH3kXg5OFIvJT/pub?output=csv"
// 1. VARIABLES GLOBALES (Siempre al principio)
var public_url = "";
var datos = [];

// 2. EL DICCIONARIO
const CONFIG_RACI = {
    "SPEI": { 
        nombre: "SPEI", 
        excel: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwbtqw-G0-PT42vuJJ9Ctwy3BIVFklNex509-zLjwPWyniibagmqcyi71aqPxL7mDgH3kXg5OFIvJT/pub?output=csv" 
    },
    "JAVA": { 
        nombre: "JAVA", 
        excel: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwbtqw-G0-PT42vuJJ9Ctwy3BIVFklNex509-zLjwPWyniibagmqcyi71aqPxL7mDgH3kXg5OFIvJT/pub?output=csv" 
    }
};

// 3. LA FUNCIÓN INIT (Defínela antes de llamarla)
function init() {
    Papa.parse(public_url, {
        download: true,
        header: false, // Asegúrate de que coincida con cómo lee tu buscarID (r[0], r[1], etc.)
        complete: function(results) {
            // ELIMINA filas vacías que a veces genera Excel al final
            datos = results.data.filter(fila => fila.length > 1 && fila[0] !== "");
            
            document.getElementById("statusTag").innerText = "Conectado";
            document.getElementById("statusTag").className = "badge bg-success text-white border py-2 px-3 mt-2 shadow-sm";
            console.log("Datos cargados:", datos.length, "registros");
        },
        error: function(err) {
            document.getElementById("statusTag").innerText = "Error de Conexión";
        }
    });
}
// 4. LÓGICA DE ARRANQUE (Al final)
const params = new URLSearchParams(window.location.search);
const idEspecialidad = params.get("e"); 

if (idEspecialidad && CONFIG_RACI[idEspecialidad]) {
    public_url = CONFIG_RACI[idEspecialidad].excel;

    let db = [];

    function fixEncoding(text) {
        try { return decodeURIComponent(escape(text)); } catch(e) { return text; }
    }

    function superParse(val, isTotal = false) {
        if (!val) return 0;
        let s = val.toString().trim().replace(',', '.');
        let n = parseFloat(s.replace(/[^0-9.-]/g, ''));
        if (isTotal) return (n > 1.5) ? n / 1000 : n;
        return (n > 1) ? n / 100 : n;
    }

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    // Convertimos a mayúsculas para que coincida con el diccionario
    const idEspecialidad = params.get("e") ? params.get("e").toUpperCase() : "SPEI"; 
    const statusTag = document.getElementById('statusTag');

    if (CONFIG_RACI[idEspecialidad]) {
        public_url = CONFIG_RACI[idEspecialidad].excel;
        
        // Actualizar el título
        const tituloPrincipal = document.querySelector('h1.display-3');
        if (tituloPrincipal) {
            tituloPrincipal.innerHTML = `CONSULTA TU <span class="text-primary">RACI: ${CONFIG_RACI[idEspecialidad].nombre}</span>`;
        }

        try {
            const r = await fetch(public_url);
            const t = await r.text();
            
            // PapaParse procesa el texto
            const res = Papa.parse(t, { skipEmptyLines: true }).data;
            
            // Buscamos el encabezado "ID" para saber dónde empiezan los datos reales
            const h = res.findIndex(row => row.some(c => c && c.toString().toUpperCase() === "ID"));
            
            // ASIGNACIÓN CRÍTICA: Llenamos la variable 'db' que usa tu buscador
            db = res.slice(h + 1).filter(row => row[1]); 

            // Si llegamos aquí, todo salió bien: poner en VERDE
            statusTag.innerText = `✅ ${CONFIG_RACI[idEspecialidad].nombre} Sincronizado: ${db.length} registros`;
            statusTag.className = "badge bg-success text-white border py-2 px-3 mt-2 shadow-sm";
            
        } catch (e) { 
            // Si algo falla: poner en ROJO
            statusTag.innerText = `❌ Error al conectar con ${idEspecialidad}`; 
            statusTag.className = "badge bg-danger text-white border py-2 px-3 mt-2 shadow-sm";
        }
    } else {
        statusTag.innerText = "⚠️ Especialidad no válida";
        statusTag.className = "badge bg-warning text-dark border py-2 px-3 mt-2 shadow-sm";
    }
};

        </li>`;

    // 5. Renderizar Gráficas y Auditoría con ID para animación

    function renderStatsAdmin() {
    // 1. Cálculos de contadores (lo que ya tenías)
    const c = { A:0, B:0, C:0, T:db.length };
    db.forEach(r => { if(c[r[33]] !== undefined) c[r[33]]++; });

    // 2. Preparamos los datos para los círculos
    // Calculamos el promedio (valor entre 0 y 1) para cada nivel
    const nivelesParaGraficar = [
        { l: 'RACI A', v: c.A, p: (c.A / c.T), k: 'var(--raci-a)' },
        { l: 'RACI B', v: c.B, p: (c.B / c.T), k: 'var(--raci-b)' },
        { l: 'RACI C', v: c.C, p: (c.C / c.T), k: 'var(--raci-c)' }
    ];

    // 3. Generamos el HTML (El círculo principal TOTAL y los 3 niveles)
    // El círculo total siempre está al 100% (1.0)
    let statsHTML = `
        <div class="col-md-3 col-6 text-center">
            <div class="donut mb-2" style="background:rgba(255,255,255,0.05)">
                <svg class="circle-chart" viewbox="0 0 33.83098862 33.83098862" width="100" height="100">
                    <circle class="circle-chart__background" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" cx="16.91549431" cy="16.91549431" r="15.91549431" />
                    <circle class="circle-chart__circle" stroke="var(--accent)" stroke-width="2" stroke-dasharray="100, 100" stroke-linecap="round" fill="none" cx="16.91549431" cy="16.91549431" r="15.91549431" />
                </svg>
                <div class="donut-inner" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">${c.T}</div>
            </div>
            <small class="fw-bold opacity-75">TOTAL</small>
        </div>
    `;

    // Añadimos los 3 círculos de niveles con ID para animar
    statsHTML += nivelesParaGraficar.map((x, index) => `
        <div class="col-md-3 col-6 text-center">
            <div class="donut mb-2" style="background:rgba(255,255,255,0.05); position:relative;">
                <svg class="circle-chart" viewbox="0 0 33.83098862 33.83098862" width="100" height="100">
                    <circle class="circle-chart__background" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" cx="16.91549431" cy="16.91549431" r="15.91549431" />
                    <circle class="circle-chart__circle" id="circle-admin-${index}" 
                        stroke="${x.k}" stroke-width="2" 
                        stroke-dasharray="0, 100" 
                        stroke-linecap="round" fill="none" 
                        cx="16.91549431" cy="16.91549431" r="15.91549431" />
                </svg>
                <div class="donut-inner" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">${x.v}</div>
            </div>
            <small class="fw-bold opacity-75">${x.l}</small>
        </div>
    `).join('');

    document.getElementById('statsAdmin').innerHTML = statsHTML;

    // 4. DISPARADOR DE LA ANIMACIÓN LENTA
    setTimeout(() => {
        nivelesParaGraficar.forEach((x, index) => {
            const circle = document.getElementById(`circle-admin-${index}`);
            if (circle) {
                // Convertimos el promedio a escala 100 para el stroke-dasharray
                const porcentaje = (x.p * 100).toFixed(2);
                circle.style.strokeDasharray = `${porcentaje}, 100`;
            }
        });
    }, 400); 
}

    async function procesarComparativaAdmin() {
        const file1 = document.getElementById('f1').files[0];
        const file2 = document.getElementById('f2').files[0];
        if(!file1 || !file2) return alert("Selecciona ambos archivos");

        const read = (f) => new Promise(res => Papa.parse(f, { 
            encoding: "ISO-8859-1", 
            complete: d => res(d.data) 
        }));
        
        const d1 = await read(file1); 
        const d2 = await read(file2);
        const resultados = [];
        
        d2.filter(n => n[1] && n[1] !== 'ID').forEach(nuevo => {
            const viejo = d1.find(v => v[1] === nuevo[1]);
            if(viejo) {
                const p1 = superParse(viejo[32], true);
                const p2 = superParse(nuevo[32], true);
                const diff = (p2 - p1).toFixed(3);
                let badge = nuevo[33];
                if(viejo[33] !== nuevo[33]) badge = `<span class="badge bg-info text-dark">${viejo[33]} ➔ ${nuevo[33]}</span>`;
                resultados.push({ id: nuevo[1], nom: nuevo[2], p1: p1.toFixed(3), p2: p2.toFixed(3), d: diff, b: badge });
            }
        });

        document.getElementById('seccionTablaAdmin').style.display = 'block';
        document.getElementById('tituloAdmin').innerText = "Comparativa Mensual Local";
        document.getElementById('headAdmin').innerHTML = `<tr><th>#</th><th>Nombre</th><th>ID</th><th>Ant.</th><th>Act.</th><th>Dif.</th><th>Nivel</th></tr>`;
        document.getElementById('bodyAdmin').innerHTML = resultados.map((r, i) => `
            <tr><td>${i+1}</td><td><b>${fixEncoding(r.nom)}</b></td><td>${r.id}</td><td>${r.p1}</td><td>${r.p2}</td>
            <td class="${r.d > 0 ? 'subio' : (r.d < 0 ? 'bajo' : '')}">${r.d > 0 ? '↑':'↓'} ${Math.abs(r.d)}</td><td>${r.b}</td></tr>
        `).join('');
    }

    function exportarAdminPDF() {
    const titulo = document.getElementById('tituloAdmin').innerText;
    const filas = document.querySelectorAll('#bodyAdmin tr');
    const encabezados = document.querySelectorAll('#headAdmin th');
    const esComparativa = titulo.includes("Comparativa");
    const coloresNivel = { 'A': '#10b981', 'B': '#8b5cf6', 'C': '#f59e0b' };

    let htmlParaPDF = `
    <div style="font-family: Arial, sans-serif; background-color: white; padding: 0; color: black; min-height: 100%;">
        
        <div style="background-color: #1e293b; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; color: white;">
            <div>
                <h1 style="margin: 0; font-size: 16pt;">${titulo.toUpperCase()}</h1>

            </div>
            <div style="text-align: right;">
                <p style="margin: 0; font-size: 10pt; font-weight: bold;">${new Date().toLocaleDateString()}</p>
                <p style="margin: 0; font-size: 8pt; opacity: 0.8;">Registros: ${filas.length}</p>
            </div>
        </div>

        <table style="width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed;">
            <thead>
                <tr style="background-color: #334155;">
                    ${Array.from(encabezados).map(th => `
                        <th style="border: 1px solid #ddd; padding: 6px; color: white; text-align: center; font-size: ${esComparativa ? '7pt' : '8pt'}; text-transform: uppercase;">${th.innerText}</th>
                    `).join('')}
                </tr>
            </thead>
            <tbody>
                ${Array.from(filas).map((tr, index) => {
                    const bgColor = (index % 2 === 0) ? '#ffffff' : '#f8fafc';
                    return `
                    <tr style="background-color: ${bgColor}; page-break-inside: avoid !important;">
                        ${Array.from(tr.cells).map((td, cellIndex) => {
                            let texto = td.innerText.trim();
                            let contenidoHtml = td.innerHTML;
                            let estiloExtra = "color: black;";

                            const nivelDestino = texto.includes('➔') || texto.includes('->') 
                                ? texto.split(/➔|->/).pop().trim() 
                                : texto;
                            
                            if (coloresNivel[nivelDestino]) {
                                const esCambio = texto.length > 1;
                                contenidoHtml = `<div style="background-color: ${coloresNivel[nivelDestino]}; color: white; min-width: ${esCambio ? 'auto' : '22px'}; padding: ${esCambio ? '0 8px' : '0'}; height: 22px; line-height: 22px; text-align: center; border-radius: 4px; font-weight: bold; margin: auto; display: inline-block; font-size: 8pt; white-space: nowrap;">${texto}</div>`;
                            }

                            if (texto.includes('↑')) {
                                estiloExtra = "color: #059669; font-weight: bold;";
                            } else if (texto.includes('↓')) {
                                const valorNum = parseFloat(texto.replace(/[^\d.-]/g, ''));
                                if (valorNum !== 0 && !isNaN(valorNum)) {
                                    estiloExtra = "color: #dc2626; font-weight: bold;";
                                } else {
                                    contenidoHtml = "0.000"; 
                                    estiloExtra = "color: black; font-weight: normal;";
                                }
                            }

                            return `<td style="border: 1px solid #ddd; padding: 5px; font-size: ${esComparativa ? '7pt' : '8pt'}; text-align: center; ${estiloExtra}">${contenidoHtml}</td>`;
                        }).join('')}
                    </tr>`;
                }).join('')}
            </tbody>
        </table>
        
        <div style="height: 60px; width: 100%; background: white; clear: both;"></div>
    </div>`;

    const opt = {
        margin: [10, 5, 15, 5],
        filename: `Reporte_RACI_${new Date().getTime()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 2, 
            useCORS: true, 
            backgroundColor: '#ffffff',
            scrollX: 0,
            scrollY: 0,
            onclone: (clonedDoc) => {
                // Forzamos que el clon tenga altura suficiente para todos los registros
                clonedDoc.body.style.height = 'auto';
            }
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };

    // Usamos el método worker para asegurar que se procese todo antes de guardar
    html2pdf().set(opt).from(htmlParaPDF).toPdf().get('pdf').then(function (pdf) {
        // Esto confirma que el PDF se generó antes de descargarlo
        console.log("PDF Generado con " + filas.length + " registros.");
    }).save();
}

function startTour() {
    const resCard = document.getElementById('resultadoUser');
    const wasHidden = (resCard.style.display === 'none' || resCard.style.display === '');
    
    // Si la tarjeta está oculta, la mostramos para el tour pero sin bajarle la opacidad
    if (wasHidden) {
        resCard.style.display = 'block';
    }

    const tour = introJs();
    tour.setOptions({
        nextLabel: 'Siguiente →',
        prevLabel: '← Atrás',
        doneLabel: '¡Entendido!',
        showProgress: true,
        steps: [
            { 
                title: '👋 ¡Hola!', 
                intro: "Bienvenido al portal para consultar tu RACI. Te enseñaré a usar la herramienta." 
            },
            { 
                element: '#idSearch', 
                intro: "Aquí ingresas tu <b>ID de colaborador</b> (ej: MOTX)." 
            },
            { 
                element: '#statusTag', 
                intro: "Este indicador confirma que los datos de tu especialidad están cargados." 
            },
            { 
                element: '#resultadoUser', 
                intro: "<b>Resultados:</b> Aquí aparecerán tus gráficas y el camino para subir de nivel." 
            }
        ]
    });

    // IMPORTANTE: Al salir del tour, limpiamos el estado
    tour.onexit(() => {
        // Si el usuario no ha buscado un ID real, volvemos a ocultar la tarjeta de ejemplo
        if (document.getElementById('resNombre').innerText === "---") {
            resCard.style.display = 'none';
        }
        // Nos aseguramos de resetear cualquier estilo de opacidad que se haya quedado
        resCard.style.opacity = '1';
    });

    tour.start();
}

function toggleDarkMode() {
    const body = document.body;
    const sw = document.getElementById('darkModeSwitch');
    const icon = document.getElementById('darkIcon');
    
    // Si el switch está marcado (ON), ponemos modo oscuro
    if (sw.checked) {
        body.classList.add('dark-mode');
        icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        icon.classList.add('text-warning');
        localStorage.setItem('theme', 'dark');
    } else {
        body.classList.remove('dark-mode');
        icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
        icon.classList.remove('text-warning');
        localStorage.setItem('theme', 'light');
    }
}

// Carga inicial: Respeta la preferencia guardada
window.addEventListener('DOMContentLoaded', () => {
    const sw = document.getElementById('darkModeSwitch');
    const icon = document.getElementById('darkIcon');
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        if(sw) sw.checked = true;
        if(icon) {
            icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
            icon.classList.add('text-warning');
        }
    } else {
        document.body.classList.remove('dark-mode');
        if(sw) sw.checked = false;
    }
});
